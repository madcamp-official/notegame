<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Codria Narrative Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#101113;--panel:#191b1f;--line:#30343a;--text:#ece9e2;--muted:#999fa8;--accent:#8bc7ff;--user:#22364a;--npc:#29262f}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace}
    header{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;position:sticky;top:0;background:#101113ee;z-index:2}
    header strong{font-size:16px} header span{color:var(--muted)} button,input,textarea{font:inherit} button{background:#252a31;color:var(--text);border:1px solid #3a414b;border-radius:6px;padding:8px 12px;cursor:pointer} button.primary{background:#155e91;border-color:#2685c5} button:disabled{opacity:.45;cursor:wait}
    main{display:grid;grid-template-columns:minmax(420px,1.25fr) minmax(380px,.85fr);height:calc(100vh - 56px)}
    .chat{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)} .toolbar{padding:12px;border-bottom:1px solid var(--line);display:flex;gap:8px}.toolbar input{width:110px;background:#111317;border:1px solid var(--line);color:var(--text);padding:8px;border-radius:6px}
    #messages{flex:1;overflow:auto;padding:18px}.message{max-width:86%;margin:0 0 14px;padding:12px 14px;border:1px solid var(--line);border-radius:9px;white-space:pre-wrap}.message.user{margin-left:auto;background:var(--user)}.message.npc{background:var(--npc)}.message.narration{background:#181b1d;color:#c9cdd2}.message small{display:block;color:var(--muted);margin-bottom:6px}
    #playerState{display:flex;gap:14px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);color:var(--muted)}#playerState strong{color:var(--text)}.health{color:#ff9c9c}
    #suggestions,#skillDock{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 10px}#suggestions button,#skillDock button{font-size:12px;text-align:left}#skillDock{padding-top:10px;border-top:1px solid var(--line)}#skillDock::before{content:'CTRL+K';color:var(--accent);font-weight:700;align-self:center;margin-right:4px}
    #inventory{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:7px;align-items:center;flex-wrap:wrap}#inventory>strong{color:var(--accent);margin-right:5px}.item{display:flex;align-items:center;gap:5px;background:#171a1f;border:1px solid var(--line);border-radius:6px;padding:5px 7px}.item button{padding:2px 6px;font-size:11px}
    .runtime-event{max-width:86%;margin:-6px 0 14px;padding:9px 12px;border:1px solid #31536d;border-radius:7px;background:#13212b;color:#b9dcf7;font-size:12px}.runtime-event strong{color:var(--accent)}
    .composer{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}textarea{flex:1;resize:none;min-height:72px;background:#121418;border:1px solid #414852;border-radius:7px;color:var(--text);padding:10px}.composer button{width:88px}
    aside{overflow:auto;padding:14px}.tabs{display:flex;gap:5px;position:sticky;top:0;background:var(--bg);padding-bottom:10px}.tabs button.active{color:var(--accent);border-color:var(--accent)}pre{margin:0;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:13px;white-space:pre-wrap;word-break:break-word;color:#cfd6df}.status{margin-left:auto}.ok{color:#87d787}.bad{color:#ff8f8f}
    @media(max-width:900px){main{grid-template-columns:1fr;height:auto}.chat{height:70vh;border-right:0;border-bottom:1px solid var(--line)}aside{height:60vh}}
  </style>
</head>
<body>
<header><strong>CODRIA / NARRATIVE LAB</strong><span>자연어 대화·메모리·서사 검증</span><span id="status" class="status">연결 중</span></header>
<main>
  <section class="chat">
    <div class="toolbar"><input id="seed" type="number" value="20260721" aria-label="seed"><button id="newRun">새 대화</button><button id="continueRun">최근 Run</button><button id="refresh">새로고침</button></div>
    <div id="playerState"><strong>넙죽이</strong><span class="health">HP —/—</span><span>현재 위치 —</span></div>
    <div id="messages"></div>
    <div id="inventory"><strong>INVENTORY</strong><span class="muted">불러오는 중</span></div>
    <div id="skillDock"></div>
    <div id="suggestions"></div>
    <div class="composer"><textarea id="input" placeholder="Risu처럼 하고 싶은 말이나 행동을 그대로 입력하세요. Shift+Enter: 줄바꿈 / Enter: 전송"></textarea><button id="send" class="primary">전송</button></div>
  </section>
  <aside><div class="tabs"><button data-tab="summary" class="active">요약</button><button data-tab="runtime">Runtime JSON</button><button data-tab="context">Prompt Context</button><button data-tab="memory">Memory</button><button data-tab="run">Run</button><button data-tab="turns">Turns</button></div><pre id="meta">아직 데이터가 없습니다.</pre></aside>
</main>
<script>
const API='http://127.0.0.1:8787'; let run=null, debug=null, tab='summary', busy=false, lastMutation=null;
const $=id=>document.getElementById(id); const pretty=v=>JSON.stringify(v,null,2);
async function api(path,options={}){const response=await fetch(API+path,{...options,headers:{'content-type':'application/json',...(options.headers||{})},body:options.body?JSON.stringify(options.body):undefined});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data?.error?.message||`HTTP ${response.status}`);return data}
function setBusy(value,label=''){busy=value; $('send').disabled=value;$('newRun').disabled=value;$('status').textContent=value?label:'온라인';$('status').className='status '+(value?'':'ok')}
function actorName(id){return run?.entities?.find(x=>x.id===id)?.name||run?.entities?.find(x=>x.id===id)?.nameKo||id||'이야기'}
function addMessage(kind,label,text,meta=''){if(!text)return;const node=document.createElement('div');node.className='message '+kind;node.innerHTML=`<small>${escapeHtml(label)}${meta?' · '+escapeHtml(meta):''}</small>${escapeHtml(text)}`;$('messages').append(node)}
function addRuntimeEvent(runtime){if(!runtime?.unity?.renderRequired)return;const event=runtime.unity.events?.[0];if(!event)return;const node=document.createElement('div');node.className='runtime-event';const roll=runtime.resolution?.roll;node.innerHTML=`<strong>UNITY · ${escapeHtml(event.type)}</strong>　${escapeHtml(event.resultTier||'-')}${roll?`　D20 ${roll.d20} / total ${roll.total}`:''}`;$('messages').append(node)}
function escapeHtml(v){const d=document.createElement('div');d.textContent=String(v);return d.innerHTML}
function render(){const box=$('messages');box.innerHTML='';if(!run)return;const opening=run.openingNarrative;if(opening){(opening.storySequence||[]).forEach(x=>addMessage(x.type==='DIALOGUE'?'npc':'narration',x.type==='DIALOGUE'?actorName(x.speakerId):x.type,x.text,opening.model));if(!(opening.storySequence||[]).length)addMessage('narration','OPENING',opening.body,opening.model)}
  for(const turn of debug?.turns||[]){const n=turn.narrative||{};const selected=turn.request?.narrativeChoice?.text||turn.request?.intent;if(selected)addMessage('user','PLAYER',selected,`turn ${turn.turnNo}`);const seq=n.storySequence||[];if(seq.length)seq.forEach(x=>addMessage(x.type==='DIALOGUE'?'npc':'narration',x.type==='DIALOGUE'?actorName(x.speakerId):x.type,x.text,`${n.model||'-'} / fallback=${!!n.fallbackUsed}`));else addMessage('narration','NARRATIVE',n.body,`${n.model||'-'} / fallback=${!!n.fallbackUsed}`);for(const d of n.dialogueDetails||[])if(!seq.some(x=>x.type==='DIALOGUE'&&x.text===d.line))addMessage('npc',actorName(d.speakerId),d.line,n.model);addRuntimeEvent(turn.runtime)}
  box.scrollTop=box.scrollHeight;renderPlayerState();renderInventory();renderChoices();renderMeta()}
function renderPlayerState(){const area=run.world?.areas?.find(x=>x.id===run.entities?.find(e=>e.id===run.playerEntityId)?.areaId);$('playerState').innerHTML=`<strong>${escapeHtml(run.protagonistName||'넙죽이')}</strong><span class="health">HP ${run.health}/${run.maxHealth}</span><span>현재 위치 ${escapeHtml(area?.name||run.currentBeat||'-')}</span>`}
function renderChoices(){const choices=run.pendingChoiceSet?.choices||[];$('suggestions').innerHTML='';$('skillDock').innerHTML='';for(const choice of choices){const b=document.createElement('button');b.textContent=(choice.choiceKind==='SKILL'?'판정 실행: ':'대화 선택: ')+choice.text;b.onclick=()=>submitChoice(choice);(choice.choiceKind==='SKILL'?$('skillDock'):$('suggestions')).append(b)}if(!$('skillDock').children.length)$('skillDock').insertAdjacentHTML('beforeend','<span>현재 장면에 실행 가능한 판정 스킬 없음</span>')}
function renderInventory(){const root=$('inventory');root.innerHTML='<strong>INVENTORY</strong>';const items=run?.inventory||[];if(!items.length)root.insertAdjacentHTML('beforeend','<span>비어 있음</span>');for(const item of items){const node=document.createElement('span');node.className='item';const label=document.createElement('span');label.textContent=`${item.name} ×${item.quantity||1}`;label.title=item.description||item.kind;node.append(label);if(!item.protected){if(item.kind==='consumable'){const use=document.createElement('button');use.textContent='사용';use.onclick=()=>inventoryAction('USE',item);node.append(use)}const drop=document.createElement('button');drop.textContent='버리기';drop.onclick=()=>inventoryAction('DROP',item);node.append(drop)}root.append(node)}const skills=run?.specialSkills||[];if(skills.length){const title=document.createElement('strong');title.textContent='SPECIAL SKILLS';title.style.marginLeft='10px';root.append(title);for(const skill of skills){const node=document.createElement('span');node.className='item';node.textContent=`${skill.name} · ${skill.baseSkill} (${skill.charges}/${skill.maxCharges})`;root.append(node)}}}
async function inventoryAction(action,item){if(!run||busy)return;setBusy(true,'인벤토리 처리 중');try{const result=await api(`/v1/runs/${run.id}/inventory`,{method:'POST',body:{action,itemId:item.id,quantity:1,expectedRunVersion:run.version}});lastMutation={type:'INVENTORY',...result};run=result.run;await load(run.id)}catch(e){$('status').textContent=e.message;$('status').className='status bad';setBusy(false)}}
function renderMeta(){if(!debug)return;const latest=debug.turns?.at(-1);const value=tab==='runtime'?(latest?.runtime||lastMutation||{message:'아직 runtime 응답이 없습니다.'}):tab==='context'?debug.promptContext:tab==='memory'?{relevantMemories:debug.relevantMemories,npcMemories:debug.run?.npcMemories,episodeSummaries:debug.run?.episodeSummaries,storyLedger:debug.run?.storyLedger,choiceHistory:debug.run?.choiceHistory}:tab==='run'?debug.run:tab==='turns'?debug.turns:{runId:run.id,status:run.status,currentTurn:run.currentTurn,version:run.version,health:{current:run.health,max:run.maxHealth},model:latest?.runtime?.turn?.model||latest?.narrative?.model||run.openingNarrative?.model,fallbackUsed:latest?.runtime?.turn?.fallbackUsed||false,renderRequired:latest?.runtime?.unity?.renderRequired||false,pendingIntervention:run.pendingChoiceSet,diagnostics:debug.diagnostics};$('meta').textContent=pretty(value)}
async function load(id){setBusy(true,'Run 불러오는 중');try{debug=await api(`/v1/runs/${id}/debug`);run=debug.run;localStorage.setItem('narrative_lab_run',run.id);render()}finally{setBusy(false)}}
async function create(){setBusy(true,'캠페인 생성 중');try{const seed=Number($('seed').value)||20260721;const c=await api('/v1/campaigns',{method:'POST',body:{title:'Narrative Lab',worldSeed:seed,turnLimit:40}});const r=await api(`/v1/campaigns/${c.campaign.id}/runs`,{method:'POST',body:{worldSeed:seed,turnLimit:40,themeHint:'인물 관계와 자연스러운 대화를 중심으로 진행'}});await load(r.run.id)}catch(e){$('status').textContent=e.message;$('status').className='status bad'}finally{setBusy(false)}}
async function send(){const text=$('input').value.trim();if(!text||!run||busy)return;setBusy(true,'모델 응답 생성 중');$('input').value='';try{await api(`/v1/runs/${run.id}/messages`,{method:'POST',body:{text,idempotencyKey:'web-message-'+crypto.randomUUID(),expectedRunVersion:run.version}});await load(run.id)}catch(e){$('input').value=text;$('status').textContent=e.message;$('status').className='status bad';setBusy(false)}}
async function submitChoice(choice){if(!run||busy)return;setBusy(true,choice.choiceKind==='SKILL'?'주사위 판정 및 장면 생성 중':'대화 장면 생성 중');try{lastMutation=await api(`/v1/runs/${run.id}/choices`,{method:'POST',body:{choiceSetId:run.pendingChoiceSet.choiceSetId,choiceId:choice.choiceId,idempotencyKey:'web-choice-'+crypto.randomUUID(),expectedRunVersion:run.version}});await load(run.id)}catch(e){$('status').textContent=e.message;$('status').className='status bad';setBusy(false)}}
$('newRun').onclick=create;$('send').onclick=send;$('refresh').onclick=()=>run&&load(run.id);$('continueRun').onclick=()=>{const id=localStorage.getItem('narrative_lab_run');if(id)load(id)};$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('skillDock').scrollIntoView({behavior:'smooth',block:'center'});$('skillDock').querySelector('button')?.focus()}});document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));renderMeta()});
api('/health').then(()=>{$('status').textContent='온라인';$('status').className='status ok';const id=localStorage.getItem('narrative_lab_run');if(id)load(id)}).catch(e=>{$('status').textContent='오프라인: '+e.message;$('status').className='status bad'});
</script>
</body>
</html>
